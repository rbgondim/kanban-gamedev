<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e12;
    --surface: #16161c;
    --surface2: #1e1e26;
    --border: #2a2a36;
    --accent: #f5c842;
    --accent2: #e8634a;
    --accent3: #6bc5a8;
    --accent4: #c47de8;
    --text: #f0eff8;
    --text-mid: #9998b0;
    --text-dim: #555468;
    --font-mono: 'Space Mono', monospace;
    --font-sans: 'Syne', sans-serif;
    --r: 10px;
    --r-sm: 6px;
    --col-backlog: #29283a;
    --col-doing:   #1e2d28;
    --col-review:  #2d2518;
    --col-blocked: #2d1e1e;
    --col-done:    #1a2830;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity:.025; pointer-events:none; z-index:9999;
  }

  /* HEADER */
  header {
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 24px; border-bottom:1px solid var(--border);
    background:var(--surface); position:sticky; top:0; z-index:100; gap:16px;
  }
  .logo-wrap { display:flex; align-items:center; gap:10px; min-width:0; }
  .logo-icon { font-size:20px; flex-shrink:0; }
  .project-name-display {
    font-size:17px; font-weight:800; letter-spacing:.3px; text-transform:uppercase;
    cursor:pointer; border-bottom:1px dashed transparent; transition:border-color .15s;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:260px;
  }
  .project-name-display:hover { border-color:var(--text-dim); }
  .project-name-input {
    font-family:var(--font-sans); font-size:17px; font-weight:800; text-transform:uppercase;
    letter-spacing:.3px; background:var(--surface2); border:1px solid var(--accent);
    color:var(--text); border-radius:4px; padding:2px 8px; outline:none; max-width:260px; display:none;
  }
  .logo-sub { font-family:var(--font-mono); font-size:9px; color:var(--text-dim); letter-spacing:.5px; flex-shrink:0; }
  .header-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
  .filter-group {
    display:flex; gap:3px; background:var(--surface2);
    border:1px solid var(--border); border-radius:var(--r-sm); padding:3px;
  }
  .filter-btn {
    font-family:var(--font-mono); font-size:9px; padding:4px 9px; border:none;
    background:transparent; color:var(--text-mid); border-radius:4px; cursor:pointer;
    transition:all .15s; letter-spacing:.5px; text-transform:uppercase;
  }
  .filter-btn.active,.filter-btn:hover { background:var(--border); color:var(--text); }

  /* BOARD */
  .board {
    display:grid; grid-template-columns:repeat(5,1fr); gap:14px;
    padding:20px 24px; min-height:calc(100vh - 61px); align-items:start;
  }
  .column { display:flex; flex-direction:column; }
  .col-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 12px; border-radius:var(--r-sm) var(--r-sm) 0 0;
    border:1px solid rgba(255,255,255,.04); border-bottom:none;
  }
  .col-header[data-col="backlog"] { background:var(--col-backlog); }
  .col-header[data-col="doing"]   { background:var(--col-doing); }
  .col-header[data-col="review"]  { background:var(--col-review); }
  .col-header[data-col="blocked"] { background:var(--col-blocked); }
  .col-header[data-col="done"]    { background:var(--col-done); }
  .col-title { font-family:var(--font-mono); font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-mid); }
  .col-right { display:flex; align-items:center; gap:8px; }
  .col-count { font-family:var(--font-mono); font-size:10px; color:var(--text-dim); }
  .col-add-btn {
    background:none; border:none; color:var(--text-dim); font-size:16px;
    cursor:pointer; line-height:1; padding:0 2px; transition:color .15s;
  }
  .col-add-btn:hover { color:var(--accent); }
  .col-body {
    background:rgba(255,255,255,.015); border:1px solid rgba(255,255,255,.04);
    border-radius:0 0 var(--r-sm) var(--r-sm); padding:8px;
    min-height:80px; display:flex; flex-direction:column; gap:8px;
    transition:background .15s,border-color .15s;
  }
  .col-body.drag-over { background:rgba(245,200,66,.04); border-color:rgba(245,200,66,.3); }

  /* CARDS */
  .card {
    background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
    padding:12px 14px; cursor:grab; transition:all .15s;
    animation:cardIn .18s ease; position:relative; overflow:hidden;
  }
  @keyframes cardIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; }
  .card[data-area="programacao"]::before { background:var(--accent); }
  .card[data-area="arte"]::before        { background:var(--accent4); }
  .card[data-area="animacao"]::before    { background:var(--accent2); }
  .card[data-area="design"]::before      { background:var(--accent3); }
  .card:hover { border-color:#3d3d50; transform:translateY(-2px); box-shadow:0 6px 20px rgba(0,0,0,.3); }
  .card.dragging { opacity:.35; cursor:grabbing; }
  .card-area {
    font-family:var(--font-mono); font-size:8px; font-weight:700; text-transform:uppercase;
    letter-spacing:1.2px; margin-bottom:7px; display:flex; align-items:center; gap:5px;
  }
  .card-area[data-area="programacao"] { color:var(--accent); }
  .card-area[data-area="arte"]         { color:var(--accent4); }
  .card-area[data-area="animacao"]     { color:var(--accent2); }
  .card-area[data-area="design"]       { color:var(--accent3); }
  .area-dot { width:5px; height:5px; border-radius:50%; background:currentColor; flex-shrink:0; }
  .card-title { font-size:13px; font-weight:600; line-height:1.4; margin-bottom:5px; }
  .card-desc {
    font-family:var(--font-mono); font-size:10px; color:var(--text-mid); line-height:1.5; margin-bottom:9px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .card-footer { display:flex; align-items:center; justify-content:space-between; }
  .priority-badge {
    font-family:var(--font-mono); font-size:8px; font-weight:700; text-transform:uppercase;
    letter-spacing:.8px; padding:2px 6px; border-radius:30px; border:1px solid;
  }
  .priority-badge[data-p="alta"]  { color:var(--accent2); border-color:var(--accent2); }
  .priority-badge[data-p="media"] { color:var(--accent); border-color:var(--accent); }
  .priority-badge[data-p="baixa"] { color:var(--text-dim); border-color:var(--text-dim); }
  .card-actions { display:flex; gap:3px; opacity:0; transition:opacity .15s; }
  .card:hover .card-actions { opacity:1; }
  .card-btn {
    background:var(--surface2); border:1px solid var(--border); color:var(--text-mid);
    font-size:10px; padding:2px 6px; border-radius:4px; cursor:pointer;
    font-family:var(--font-mono); transition:all .1s;
  }
  .card-btn:hover { background:var(--border); color:var(--text); }
  .card-btn.delete:hover { border-color:var(--accent2); color:var(--accent2); }
  .empty-state {
    font-family:var(--font-mono); font-size:10px; color:var(--text-dim);
    text-align:center; padding:16px 8px; letter-spacing:.5px; pointer-events:none;
  }

  /* MODAL */
  .overlay {
    display:none; position:fixed; inset:0; background:rgba(0,0,0,.72);
    backdrop-filter:blur(4px); z-index:200; align-items:center; justify-content:center;
  }
  .overlay.open { display:flex; }
  .modal {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:26px 28px; width:440px; max-width:95vw;
    animation:modalIn .2s ease; box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  @keyframes modalIn { from{opacity:0;transform:scale(.96) translateY(8px)} to{opacity:1;transform:scale(1) translateY(0)} }
  .modal-title { font-size:16px; font-weight:700; margin-bottom:20px; }
  .form-group { margin-bottom:14px; }
  .form-label { font-family:var(--font-mono); font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--text-mid); display:block; margin-bottom:5px; }
  .form-input,.form-select,.form-textarea {
    width:100%; background:var(--surface2); border:1px solid var(--border);
    border-radius:var(--r-sm); color:var(--text); font-family:var(--font-sans);
    font-size:13px; padding:9px 11px; outline:none; transition:border .15s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus { border-color:var(--accent); }
  .form-textarea { resize:vertical; min-height:72px; font-family:var(--font-mono); font-size:11px; }
  .form-select option { background:var(--surface2); }
  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:20px; }
  .btn-cancel {
    font-family:var(--font-sans); font-size:12px; font-weight:600; padding:8px 16px;
    background:transparent; border:1px solid var(--border); color:var(--text-mid);
    border-radius:var(--r-sm); cursor:pointer; transition:all .15s;
  }
  .btn-cancel:hover { border-color:var(--text-mid); color:var(--text); }
  .btn-save {
    font-family:var(--font-sans); font-size:12px; font-weight:700; padding:8px 18px;
    background:var(--accent); color:#0e0e12; border:none; border-radius:var(--r-sm); cursor:pointer; transition:all .15s;
  }
  .btn-save:hover { background:#ffd860; }

  /* STATUS / TOAST */
  .status-bar {
    position:fixed; bottom:18px; right:20px; font-family:var(--font-mono); font-size:10px;
    padding:6px 12px; background:var(--surface); border:1px solid var(--border);
    border-radius:30px; color:var(--text-mid); display:flex; align-items:center; gap:6px;
    transition:all .3s; z-index:100;
  }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent3); animation:pulse 2s infinite; }
  .status-bar.syncing .status-dot { background:var(--accent); animation:none; }
  .status-bar.error   .status-dot { background:var(--accent2); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .toast {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%) translateY(20px);
    font-family:var(--font-mono); font-size:11px; padding:8px 16px;
    background:var(--surface2); border:1px solid var(--border); border-radius:30px;
    color:var(--text-mid); opacity:0; transition:all .3s; z-index:300; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.error { border-color:var(--accent2); color:var(--accent2); }

  /* SQL HELPER */
  .sql-helper {
    position:fixed; inset:0; background:rgba(0,0,0,.9); backdrop-filter:blur(6px);
    z-index:400; align-items:center; justify-content:center; display:none;
  }
  .sql-helper.open { display:flex; }
  .sql-box {
    background:var(--surface); border:1px solid var(--border); border-radius:16px;
    padding:28px 32px; width:640px; max-width:95vw; box-shadow:0 24px 60px rgba(0,0,0,.6);
  }
  .sql-box h2 { font-size:16px; font-weight:700; margin-bottom:8px; }
  .sql-box p { font-family:var(--font-mono); font-size:11px; color:var(--text-mid); line-height:1.6; margin-bottom:14px; }
  .sql-box a { color:var(--accent); }
  .sql-code {
    background:var(--surface2); border:1px solid var(--border); border-radius:var(--r-sm);
    padding:16px; font-family:var(--font-mono); font-size:10px; line-height:1.7; color:var(--accent3);
    white-space:pre; overflow-x:auto; margin-bottom:16px; max-height:300px; overflow-y:auto;
  }
  .sql-actions { display:flex; gap:10px; justify-content:flex-end; }
  .btn-copy {
    font-family:var(--font-sans); font-size:12px; font-weight:600; padding:8px 16px;
    background:var(--surface2); border:1px solid var(--border); color:var(--text-mid);
    border-radius:var(--r-sm); cursor:pointer; transition:all .15s;
  }
  .btn-copy:hover { color:var(--text); border-color:var(--text-mid); }
  .btn-done {
    font-family:var(--font-sans); font-size:12px; font-weight:700; padding:8px 18px;
    background:var(--accent); color:#0e0e12; border:none; border-radius:var(--r-sm); cursor:pointer;
  }
</style>
</head>
<body>

<header>
  <div class="logo-wrap">
    <span class="logo-icon">🎺</span>
    <span class="project-name-display" id="projectNameDisplay" title="Clique para editar o nome">TRUMPET</span>
    <input class="project-name-input" id="projectNameInput" type="text" maxlength="40">
    <span class="logo-sub">// dev board</span>
  </div>
  <div class="header-right">
    <div class="filter-group">
      <button class="filter-btn active" data-filter="all">all</button>
      <button class="filter-btn" data-filter="programacao">code</button>
      <button class="filter-btn" data-filter="arte">art</button>
      <button class="filter-btn" data-filter="animacao">anim</button>
      <button class="filter-btn" data-filter="design">design</button>
    </div>
  </div>
</header>

<div class="board" id="board"></div>

<!-- CARD MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">novo card</div>
    <div class="form-group">
      <label class="form-label">título</label>
      <input class="form-input" id="f-title" type="text" placeholder="ex: Tela de início">
    </div>
    <div class="form-group">
      <label class="form-label">descrição</label>
      <textarea class="form-textarea" id="f-desc" placeholder="detalhes, contexto, referências..."></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">área</label>
        <select class="form-select" id="f-area">
          <option value="programacao">🖥 Programação</option>
          <option value="arte">🎨 Arte</option>
          <option value="animacao">✨ Animação</option>
          <option value="design">🔷 Design</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">prioridade</label>
        <select class="form-select" id="f-priority">
          <option value="alta">alta</option>
          <option value="media" selected>média</option>
          <option value="baixa">baixa</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">status</label>
      <select class="form-select" id="f-status">
        <option value="backlog">Backlog</option>
        <option value="doing">Em andamento</option>
        <option value="review">Em revisão</option>
        <option value="blocked">Bloqueado</option>
        <option value="done">Concluído</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModalDirect()">cancelar</button>
      <button class="btn-save" onclick="saveCard()">salvar</button>
    </div>
  </div>
</div>

<!-- SQL SETUP HELPER -->
<div class="sql-helper" id="sqlHelper">
  <div class="sql-box">
    <h2>⚠ Setup necessário</h2>
    <p>Rode esse SQL no <strong>SQL Editor</strong> do Supabase (<a href="https://supabase.com/dashboard/project/rrijhlxaeyecljpokbxl/sql/new" target="_blank">abrir aqui ↗</a>), depois clique em "Pronto".</p>
    <div class="sql-code" id="sqlCode"></div>
    <div class="sql-actions">
      <button class="btn-copy" onclick="copySQL()">📋 copiar SQL</button>
      <button class="btn-done" onclick="dismissSQL()">Pronto →</button>
    </div>
  </div>
</div>

<div class="status-bar" id="status-bar">
  <div class="status-dot"></div>
  <span id="status-text">conectando...</span>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://rrijhlxaeyecljpokbxl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qOCF3B0dLzpDIdJSn8GEQg_gCImIphE';

const SETUP_SQL = `-- Tabela de cards
create table if not exists trumpet_cards (
  id uuid default gen_random_uuid() primary key,
  title text not null,
  description text,
  area text default 'programacao',
  status text default 'backlog',
  priority text default 'media',
  position int default 0,
  created_at timestamptz default now(),
  updated_at timestamptz default now()
);

-- Tabela de metadados
create table if not exists trumpet_meta (
  key text primary key,
  value text
);
insert into trumpet_meta (key, value)
  values ('project_name', 'TRUMPET')
  on conflict (key) do nothing;

-- Trigger updated_at
create or replace function update_updated_at()
returns trigger as $$
begin new.updated_at = now(); return new; end;
$$ language plpgsql;

drop trigger if exists trumpet_cards_ts on trumpet_cards;
create trigger trumpet_cards_ts
  before update on trumpet_cards
  for each row execute function update_updated_at();

-- RLS
alter table trumpet_cards enable row level security;
alter table trumpet_meta  enable row level security;
drop policy if exists "open_cards" on trumpet_cards;
drop policy if exists "open_meta"  on trumpet_meta;
create policy "open_cards" on trumpet_cards for all using (true) with check (true);
create policy "open_meta"  on trumpet_meta  for all using (true) with check (true);`;

document.getElementById('sqlCode').textContent = SETUP_SQL;

// ── STATE ──────────────────────────────────────────────────────
let cards = [];
let editingId = null;
let dragId = null;
let activeFilter = 'all';
let projectName = 'TRUMPET';

const COLUMNS = [
  { id:'backlog',  label:'backlog' },
  { id:'doing',    label:'em andamento' },
  { id:'review',   label:'em revisão' },
  { id:'blocked',  label:'bloqueado' },
  { id:'done',     label:'concluído' },
];

const AREA_LABEL = {
  programacao:'🖥 code', arte:'🎨 arte', animacao:'✨ anim', design:'🔷 design'
};

// ── API ────────────────────────────────────────────────────────
async function req(method, path, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    method,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation',
    },
    body: body ? JSON.stringify(body) : undefined,
  });
  const text = await r.text();
  if (!r.ok) throw Object.assign(new Error(text), { status: r.status });
  return text ? JSON.parse(text) : null;
}

async function loadAll() {
  setStatus('syncing','carregando...');
  try {
    const [cardsData, metaData] = await Promise.allSettled([
      req('GET','trumpet_cards?order=position.asc,created_at.asc'),
      req('GET','trumpet_meta?key=eq.project_name'),
    ]);

    if (cardsData.status === 'fulfilled') {
      cards = cardsData.value || [];
    } else {
      const msg = cardsData.reason?.message || '';
      if (msg.includes('does not exist') || msg.includes('42P01')) {
        document.getElementById('sqlHelper').classList.add('open');
        setStatus('error','setup necessário');
        return;
      }
      throw cardsData.reason;
    }

    if (metaData.status === 'fulfilled' && metaData.value?.[0]) {
      projectName = metaData.value[0].value;
      document.getElementById('projectNameDisplay').textContent = projectName;
    }

    setStatus('ok','conectado');
    renderBoard();
  } catch(e) {
    setStatus('error','erro ao carregar');
    toast('Erro: ' + (e.message||e), true);
  }
}

async function apiCreate(data) {
  setStatus('syncing','salvando...');
  try {
    const r = await req('POST','trumpet_cards', data);
    cards.push(r[0]);
    renderBoard();
    setStatus('ok','conectado');
    toast('card criado ✓');
  } catch(e) { setStatus('error','erro'); toast(e.message,true); }
}

async function apiUpdate(id, patch) {
  setStatus('syncing','salvando...');
  try {
    await req('PATCH',`trumpet_cards?id=eq.${id}`, patch);
    const i = cards.findIndex(c=>c.id===id);
    if (i!==-1) cards[i] = {...cards[i], ...patch};
    renderBoard();
    setStatus('ok','conectado');
  } catch(e) { setStatus('error','erro'); toast(e.message,true); }
}

async function apiDelete(id) {
  setStatus('syncing','deletando...');
  try {
    await req('DELETE',`trumpet_cards?id=eq.${id}`);
    cards = cards.filter(c=>c.id!==id);
    renderBoard();
    setStatus('ok','conectado');
    toast('deletado');
  } catch(e) { setStatus('error','erro'); toast(e.message,true); }
}

async function saveProjectName(name) {
  try {
    await req('PATCH','trumpet_meta?key=eq.project_name',{value:name});
  } catch {
    try { await req('POST','trumpet_meta',{key:'project_name',value:name}); } catch{}
  }
}

// ── RENDER ─────────────────────────────────────────────────────
function renderBoard() {
  const filtered = activeFilter==='all' ? cards : cards.filter(c=>c.area===activeFilter);
  const board = document.getElementById('board');
  board.innerHTML = '';

  COLUMNS.forEach(col => {
    const colCards = filtered.filter(c=>c.status===col.id);
    const el = document.createElement('div');
    el.className = 'column';
    el.dataset.status = col.id;
    el.innerHTML = `
      <div class="col-header" data-col="${col.id}">
        <span class="col-title">${col.label}</span>
        <div class="col-right">
          <span class="col-count">${colCards.length}</span>
          <button class="col-add-btn" title="novo card nesta coluna" onclick="openModal('${col.id}')">＋</button>
        </div>
      </div>
      <div class="col-body" id="body-${col.id}"
           ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragleave="onDragLeave(event)">
        ${colCards.length===0
          ? '<div class="empty-state">— vazio —</div>'
          : colCards.map(renderCard).join('')}
      </div>`;
    board.appendChild(el);
  });
}

function renderCard(c) {
  return `
    <div class="card" data-id="${c.id}" data-area="${c.area}"
         draggable="true"
         ondragstart="onDragStart(event,'${c.id}')"
         ondragend="onDragEnd(event)">
      <div class="card-area" data-area="${c.area}">
        <span class="area-dot"></span>${AREA_LABEL[c.area]||c.area}
      </div>
      <div class="card-title">${esc(c.title)}</div>
      ${c.description?`<div class="card-desc">${esc(c.description)}</div>`:''}
      <div class="card-footer">
        <span class="priority-badge" data-p="${c.priority}">${c.priority}</span>
        <div class="card-actions">
          <button class="card-btn" onclick="openEdit('${c.id}')">editar</button>
          <button class="card-btn" onclick="duplicateCard('${c.id}')" title="duplicar">⧉</button>
          <button class="card-btn delete" onclick="confirmDelete('${c.id}')">✕</button>
        </div>
      </div>
    </div>`;
}

const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

// ── PROJECT NAME ───────────────────────────────────────────────
const nameDisplay = document.getElementById('projectNameDisplay');
const nameInput   = document.getElementById('projectNameInput');

nameDisplay.addEventListener('click', () => {
  nameInput.value = projectName;
  nameDisplay.style.display = 'none';
  nameInput.style.display = 'inline-block';
  nameInput.focus(); nameInput.select();
});

function commitName() {
  const v = nameInput.value.trim().toUpperCase();
  if (v && v !== projectName) {
    projectName = v;
    saveProjectName(v);
    toast('nome atualizado ✓');
  }
  nameDisplay.textContent = projectName;
  nameDisplay.style.display = '';
  nameInput.style.display = 'none';
}

nameInput.addEventListener('blur', commitName);
nameInput.addEventListener('keydown', e => {
  if (e.key==='Enter') nameInput.blur();
  if (e.key==='Escape') { nameInput.value=projectName; nameInput.blur(); }
});

// ── MODAL ──────────────────────────────────────────────────────
function openModal(status='backlog') {
  editingId = null;
  document.getElementById('modal-title').textContent = 'novo card';
  document.getElementById('f-title').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-area').value = 'programacao';
  document.getElementById('f-priority').value = 'media';
  document.getElementById('f-status').value = status;
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-title').focus(), 80);
}

function openEdit(id) {
  const c = cards.find(c=>c.id===id); if (!c) return;
  editingId = id;
  document.getElementById('modal-title').textContent = 'editar card';
  document.getElementById('f-title').value = c.title;
  document.getElementById('f-desc').value = c.description||'';
  document.getElementById('f-area').value = c.area;
  document.getElementById('f-priority').value = c.priority;
  document.getElementById('f-status').value = c.status;
  document.getElementById('overlay').classList.add('open');
}

function closeModal(e) { if(e.target===document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('overlay').classList.remove('open'); editingId=null; }

async function saveCard() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const payload = {
    title,
    description: document.getElementById('f-desc').value.trim()||null,
    area:     document.getElementById('f-area').value,
    priority: document.getElementById('f-priority').value,
    status:   document.getElementById('f-status').value,
    position: 0,
  };
  closeModalDirect();
  if (editingId) await apiUpdate(editingId, payload);
  else           await apiCreate(payload);
}

async function confirmDelete(id) {
  const c = cards.find(c=>c.id===id); if(!c) return;
  if (confirm(`Deletar "${c.title}"?`)) await apiDelete(id);
}

async function duplicateCard(id) {
  const c = cards.find(c=>c.id===id); if(!c) return;
  await apiCreate({
    title:       c.title + ' (cópia)',
    description: c.description,
    area:        c.area,
    priority:    c.priority,
    status:      c.status,
    position:    c.position + 1,
  });
}

// ── DRAG & DROP ────────────────────────────────────────────────
function onDragStart(e,id) {
  dragId = id;
  setTimeout(()=>{
    const el = document.querySelector(`[data-id="${id}"]`);
    if(el) el.classList.add('dragging');
  },0);
}
function onDragEnd() {
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('dragging'));
  document.querySelectorAll('.col-body').forEach(c=>c.classList.remove('drag-over'));
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  const newStatus = e.currentTarget.id.replace('body-','');
  if (!dragId||!newStatus) return;
  const c = cards.find(c=>c.id===dragId);
  if (c && c.status!==newStatus) await apiUpdate(dragId,{status:newStatus});
  dragId = null;
}

// ── FILTERS ────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderBoard();
  });
});

// ── STATUS / TOAST ─────────────────────────────────────────────
function setStatus(type,text) {
  const bar = document.getElementById('status-bar');
  bar.className = 'status-bar '+(type!=='ok'?type:'');
  document.getElementById('status-text').textContent = text;
}
let toastT;
function toast(msg,isError=false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(isError?' error':'');
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove('show'),2600);
}

// ── SQL HELPER ─────────────────────────────────────────────────
function copySQL() {
  navigator.clipboard.writeText(SETUP_SQL).then(()=>toast('SQL copiado!'));
}
function dismissSQL() {
  document.getElementById('sqlHelper').classList.remove('open');
  loadAll();
}

// ── KEYBOARD ───────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModalDirect();
  if((e.ctrlKey||e.metaKey)&&e.key==='k'){e.preventDefault();openModal();}
});

// ── INIT ───────────────────────────────────────────────────────
loadAll();
setInterval(loadAll, 20000);
</script>
